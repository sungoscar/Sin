<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscar's 3D Work</title>
    <style>
        /* 基礎樣式設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 容器卡片 - 毛玻璃效果 */
        .container {
            width: 90%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #a0a0a0;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        /* 3D 模型封裝容器 */
        .sketchfab-embed-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 比例 */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(28, 170, 217, 0.3);
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 按鈕與連結樣式 */
        .footer-links {
            margin-top: 25px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            color: #1CAAD9;
            font-weight: bold;
            padding: 10px 20px;
            border: 1px solid #1CAAD9;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #1CAAD9;
            color: #fff;
            box-shadow: 0 0 15px rgba(28, 170, 217, 0.5);
        }

        .author-tag {
            display: block;
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Oscar's 3D Homework</h1>
    <p class="subtitle"></p>

    <div class="sketchfab-embed-wrapper">
        <iframe 
            title="3d_homework" 
            src="https://sketchfab.com/models/647f9c9c375a439e84e917d99af7a657/embed?autostart=1&preload=1"
            allow="autoplay; fullscreen; xr-spatial-tracking" 
            execution-while-out-of-viewport 
            execution-while-not-rendered 
            web-share>
        </iframe>
    </div>

    <div class="footer-links">
        <a class="btn" href="https://skfb.ly/pIKN9" target="_blank">在 Sketchfab 上查看完整作品</a>
        <span class="author-tag">Created by 0926987 on Sketchfab</span>
    </div>
</div>

</body>
</html>
